# Solo Company - Nginx 配置示例
# 将此配置复制到一体机的 /etc/nginx/sites-available/solo-company
# 然后创建软链接: sudo ln -s /etc/nginx/sites-available/solo-company /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name localhost;  # 改成你的域名或一体机 IP

    # 日志
    access_log /var/log/nginx/solo-company.access.log;
    error_log /var/log/nginx/solo-company.error.log;

    # 前端静态文件
    location / {
        root /path/to/solo-company/dist;  # 改成实际的 dist 路径
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API 代理到 Node 后端
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 长连接支持（openclaw 调用可能较慢）
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

